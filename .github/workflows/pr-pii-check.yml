name: PR PII Check

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  pull-requests: read

jobs:
  check-pii:
    name: Check for PII in PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review_comment'
    steps:
      - name: Check PR description for PII
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Checking PR description for PII patterns..."
          # Strip the auto-appended system metadata footer (Devin session link,
          # requester line, review badge) before checking. These lines are added
          # by the system and cleaned up by sanitize-pr-pii.sh — we only want to
          # catch user-authored PII in the PR body itself.
          USER_BODY=$(printf '%s\n' "$PR_BODY" | sed 's/\r$//' | sed '/^Link to Devin session:/,$d' | sed '/^<!-- devin-review-badge/,$d' | sed '/^Requested by:/d')
          if printf '%s\n' "$USER_BODY" | grep -qPi 'requested\s+by\s*:\s*\S'; then
            echo "::error::PR description contains 'Requested by' PII. Remove it before merging."
            echo ""
            echo "Found pattern matching 'Requested by: ...' in the PR description."
            echo "This is a privacy violation in a multi-tenant environment."
            echo ""
            echo "To fix: edit the PR description and remove the 'Requested by' line."
            echo "To bulk-fix existing PRs: ./scripts/sanitize-pr-pii.sh <ORG>"
            exit 1
          fi
          echo "No PII found in PR description."

      - name: Check comment for PII
        if: github.event_name == 'pull_request_review_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "Checking comment for PII patterns..."
          if printf '%s\n' "$COMMENT_BODY" | grep -qPi 'requested\s+by\s*:\s*\S'; then
            echo "::error::Comment contains 'Requested by' PII. Edit the comment to remove it."
            exit 1
          fi
          echo "No PII found in comment."
